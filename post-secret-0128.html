<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Create Story</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-page" style="background-color: #ffffff; color: #000; padding: 50px 20px;">
    <div class="admin-container" style="max-width: 700px; margin: 0 auto;">
        <h1 style="font-family: 'Playfair Display', serif; margin-bottom: 30px;">New Story</h1>
        
        <form id="diary-form">
            <div style="margin-bottom: 30px;">
                <label style="font-size: 0.8rem; letter-spacing: 1px; color: #666; text-transform: uppercase;">Today's Music</label>
                <input type="text" id="post-music" placeholder="Artist - Song Title" 
                       style="width: 100%; padding: 10px 0; margin-top: 5px; border: none; border-bottom: 1px solid #ddd; outline: none; font-family: 'Playfair Display', serif; font-style: italic;">
            </div>

            <div style="margin-bottom: 30px;">
                <label style="font-weight: bold;">Main Title</label>
                <input type="text" id="post-title" placeholder="Enter title..." required 
                       style="width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd;">
            </div>

            <div id="sections-container">
                <div class="content-section" style="border: 1px solid #eee; padding: 20px; margin-bottom: 20px; position: relative;">
                    <div style="margin-bottom: 15px;">
                        <label>Image</label>
                        <input type="file" class="item-file" accept="image/*" required style="display: block; margin-top: 5px;">
                        <div class="preview-area" style="margin-top: 10px; width: 100px; height: 100px; border: 2px solid #ddd; overflow: hidden; cursor: pointer;">
                            <img src="" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                        </div>
                        <small class="thumb-label" style="color: #007bff; display: none;">★ Selected as Thumbnail</small>
                    </div>
                    <div>
                        <label>Description</label>
                        <textarea class="item-text" rows="4" placeholder="Write description for this photo..." 
                                  style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd;"></textarea>
                    </div>
                </div>
            </div>

            <button type="button" id="add-section-btn" style="width: 100%; padding: 10px; background: #f4f4f4; border: 1px dashed #ccc; cursor: pointer; margin-bottom: 30px;">
                + Add Next Photo & Text
            </button>
            
            <button type="submit" id="submit-btn" style="background: #000; color: #fff; padding: 15px 30px; border: none; cursor: pointer; width: 100%; font-weight: bold;">
                PUBLISH STORY
            </button>
        </form>
        <p style="margin-top: 30px;"><a href="archive.html" style="color: #999; text-decoration: none;">← Back to Archive</a></p>
    </div>

    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <script type="module" src="admin.js"></script>
</body>
</html>
